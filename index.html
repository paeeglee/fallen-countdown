<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Obrigado, Professor — Thank You, Professor</title>
<meta name="description" content="Tributo a Gabriel 'FalleN' Toledo · A tribute to Gabriel 'FalleN' Toledo. Countdown to 31.12.2026." />
<meta name="theme-color" content="#0a0a0c" />
<link rel="alternate" hreflang="pt-BR" href="https://www.obrigadoprofessor.com/br/" />
<link rel="alternate" hreflang="en" href="https://www.obrigadoprofessor.com/en/" />
<link rel="alternate" hreflang="x-default" href="https://www.obrigadoprofessor.com/" />

<!-- Open Graph (used when /  is shared directly, before the redirect picks the locale) -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Obrigado, Professor" />
<meta property="og:url" content="https://www.obrigadoprofessor.com/" />
<meta property="og:title" content="Obrigado, Professor — Countdown to 31.12.2026" />
<meta property="og:description" content="Tributo a Gabriel 'FalleN' Toledo · A tribute to FalleN. Countdown to his official retirement." />
<meta property="og:image" content="https://raw.githubusercontent.com/paeeglee/fallen-countdown/main/assets/img/og-image.jpg" />
<meta property="og:image:type" content="image/jpeg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="1200" />

<style>
  html, body { background: #0a0a0c; color: #f4f4f5; margin: 0; height: 100%; font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .wrap { display: grid; place-items: center; height: 100%; gap: 16px; text-align: center; padding: 24px; }
  .mark {
    width: 36px; height: 36px;
    border: 2px solid #e7c547; color: #e7c547;
    display: grid; place-items: center;
    transform: rotate(45deg);
    font-weight: 700;
  }
  .mark span { transform: rotate(-45deg); }
  .msg { font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: #6b6b75; }
  .links { display: flex; gap: 12px; margin-top: 8px; }
  .links a {
    color: #f4f4f5; text-decoration: none;
    border: 1px solid rgba(255,255,255,0.18);
    padding: 8px 14px; font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .links a:hover { border-color: #e7c547; color: #e7c547; }
</style>
</head>
<body>
<div class="wrap">
  <div class="mark"><span>F</span></div>
  <div class="msg">Redirecting…</div>
  <div class="links">
    <a href="./br/">Português</a>
    <a href="./en/">English</a>
  </div>
</div>

<script>
(function () {
  var VALID = { br: 1, en: 1 };
  var KEY = 'lang';
  var lang = null;

  // 1) Query param wins
  try {
    var qp = new URLSearchParams(window.location.search).get(KEY);
    if (qp && VALID[qp]) {
      lang = qp;
      try { localStorage.setItem(KEY, lang); } catch (_) {}
    }
  } catch (_) {}

  // 2) Fall back to localStorage
  if (!lang) {
    try {
      var stored = localStorage.getItem(KEY);
      if (stored && VALID[stored]) lang = stored;
    } catch (_) {}
  }

  // 3) Default
  if (!lang) lang = 'br';

  window.location.replace('./' + lang + '/');
})();
</script>
<noscript><meta http-equiv="refresh" content="0; url=./br/"></noscript>
</body>
</html>
